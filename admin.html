<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Admin Dashboard</title>
    <!-- Firebase SDKs ထည့်သွင်းခြင်း -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --success: #2ed573;
            --dark: #2f3542;
            --light: #f1f2f6;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #747d8c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 25px; }
        .container { max-width: 1000px; margin: 0 auto; }

        /* Modern Header */
        header { 
            background: linear-gradient(135deg, #2f3542, #1e272e); 
            color: white; 
            padding: 25px; 
            border-radius: 16px; 
            text-align: center; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
        }
        h1 { font-size: 24px; margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; }
        header p { color: #a4b0be; font-size: 14px; }

        /* Stats Dashboard Cards */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.04); 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            border-top: 4px solid var(--primary);
            transition: transform 0.2s ease;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card.profit-card { border-top-color: var(--success); }
        .stat-card span { font-size: 13px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card h3 { font-size: 22px; color: var(--dark); font-weight: 700; }

        /* Filter Section Styling */
        .filter-section { 
            background: var(--card-bg); 
            padding: 18px 25px; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.04); 
            flex-wrap: wrap; 
            gap: 15px; 
        }
        .filter-group { display: flex; align-items: center; gap: 12px; }
        .filter-group label { font-weight: 600; font-size: 14px; color: var(--dark); }
        .filter-group input[type="date"] { 
            padding: 10px 14px; 
            border: 1px solid #dcdde1; 
            border-radius: 8px; 
            font-size: 14px; 
            outline: none; 
            transition: border-color 0.2s;
        }
        .filter-group input[type="date"]:focus { border-color: var(--primary); }
        .reset-btn { 
            background: var(--text-muted); 
            color: white; 
            border: none; 
            padding: 10px 18px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 500;
            transition: background 0.2s, transform 0.1s; 
        }
        .reset-btn:hover { background: #57606f; }
        .reset-btn:active { transform: scale(0.98); }

        /* Orders Grid & Cards */
        .orders-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .order-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 22px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.04); 
            border-left: 6px solid var(--primary); 
            animation: fadeIn 0.3s ease; 
        }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--light); padding-bottom: 12px; margin-bottom: 15px; }
        .order-title { font-size: 18px; font-weight: 700; color: var(--dark); display: flex; align-items: center; gap: 8px; }
        .order-time { font-size: 13px; color: var(--text-muted); background: var(--light); padding: 5px 10px; border-radius: 20px; font-weight: 500; }
        
        .order-items-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .order-items-table th, .order-items-table td { padding: 10px 8px; text-align: left; font-size: 14px; border-bottom: 1px dashed var(--light); }
        .order-items-table th { color: var(--text-muted); font-weight: 600; }
        
        .order-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 5px; }
        .total-price { font-size: 17px; font-weight: 700; color: var(--primary); }
        
        .complete-btn { 
            background: var(--success); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s; 
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.2);
        }
        .complete-btn:hover { background: #26af5f; }
        .complete-btn:active { transform: scale(0.98); }

        .no-orders { 
            text-align: center; 
            background: var(--card-bg); 
            padding: 45px; 
            border-radius: 16px; 
            color: var(--text-muted); 
            font-size: 15px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.04); 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(8px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .filter-section { flex-direction: column; align-items: stretch; }
            .filter-group { flex-direction: column; align-items: stretch; }
            .reset-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Restaurant Admin Dashboard</h1>
            <p>Live Orders & Daily Business Reports</p>
        </header>

        <!-- 📊 စုစုပေါင်း ရောင်းရငွေနှင့် အမြတ်ငွေ ပြမည့် Cards -->
        <div class="stats-container">
            <div class="stat-card">
                <span>စုစုပေါင်း ရောင်းရငွေ (Sales)</span>
                <h3 id="selectedSales">0 MMK</h3>
            </div>
            <div class="stat-card profit-card">
                <span>စုစုပေါင်း အမြတ်ငွေ (Profit)</span>
                <h3 id="selectedProfit" style="color: var(--success);">0 MMK</h3>
            </div>
        </div>

        <!-- 🔍 ရက်စွဲအလိုက် စစ်ဆေးရန် Filter -->
        <div class="filter-section">
            <div class="filter-group">
                <label for="filterDate">ရက်စွဲအလိုက် ကြည့်ရန်:</label>
                <input type="date" id="filterDate">
            </div>
            <button class="reset-btn" id="resetDateBtn">ယနေ့သို့ ပြန်သွားရန်</button>
        </div>

        <!-- 📦 အော်ဒါများ ပေါ်မည့် နေရာ -->
        <div class="orders-grid" id="ordersContainer">
            <div class="no-orders">⌛ အော်ဒါအချက်အလက်များကို ချိတ်ဆက်နေပါသည်...</div>
        </div>
    </div>

    <script>
        // Firebase Configuration (သင့်ရဲ့ Project အချက်အလက်များ)
        const firebaseConfig = {
            apiKey: "AIzaSyAV_3fSOQDigao1MDeZ12V734yqqHBKSDw",
            authDomain: "smart-restaurant-85871.firebaseapp.com",
            projectId: "smart-restaurant-85871",
            storageBucket: "smart-restaurant-85871.firebasestorage.app",
            messagingSenderId: "909399970300",
            appId: "1:909399970300:web:8da6c6522af7b1a6296279",
            measurementId: "G-2Z502F3XZP"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ordersContainer = document.getElementById('ordersContainer');
        const filterDateInput = document.getElementById('filterDate');

        // Default အနေဖြင့် ယနေ့ရက်စွဲကို သတ်မှတ်မည်
        let selectedDate = new Date().toISOString().split('T')[0];
        filterDateInput.value = selectedDate;

        // Real-time listener ဖြင့် ဒေတာများ ထုတ်ယူခြင်းနှင့် Filter လုပ်ခြင်း
        function loadOrdersAndStats() {
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                let totalSales = 0;
                let totalProfit = 0;
                let html = '';
                let hasOrdersForSelectedDate = false;

                snapshot.forEach((doc) => {
                    let order = doc.data();
                    let docId = doc.id;

                    // ရက်စွဲတူညီမှသာ ဝင်ငွေ/အမြတ် တွက်ချက်မည်
                    if (order.dateStr === selectedDate) {
                        totalSales += (order.total || 0);
                        totalProfit += (order.profit || 0);
                        hasOrdersForSelectedDate = true;

                        let itemsHtml = '';
                        if (order.items) {
                            order.items.forEach(item => {
                                itemsHtml += `
                                    <tr>
                                        <td>${item.name}</td>
                                        <td>x ${item.quantity}</td>
                                        <td>${(item.price * item.quantity).toLocaleString()} MMK</td>
                                    </tr>
                                `;
                            });
                        }

                        html += `
                            <div class="order-card">
                                <div class="order-header">
                                    <div class="order-title">🍽️ Table ${order.table}</div>
                                    <div class="order-time">🕒 ${order.timeStr || 'Just now'}</div>
                                </div>
                                <table class="order-items-table">
                                    <thead>
                                        <tr>
                                            <th>Item Name</th>
                                            <th>Qty</th>
                                            <th>Subtotal</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${itemsHtml}
                                    </tbody>
                                </table>
                                <div class="order-footer">
                                    <div class="total-price">Total: ${order.total ? order.total.toLocaleString() : 0} MMK</div>
                                    <button class="complete-btn" onclick="completeOrder('${docId}')">Mark as Complete</button>
                                </div>
                            </div>
                        `;
                    }
                });

                // Summary Values ထည့်သွင်းခြင်း
                document.getElementById('selectedSales').innerText = totalSales.toLocaleString() + " MMK";
                document.getElementById('selectedProfit').innerText = totalProfit.toLocaleString() + " MMK";

                // အော်ဒါမရှိပါက
                if (!hasOrdersForSelectedDate) {
                    ordersContainer.innerHTML = `<div class="no-orders">📭 ရွေးချယ်ထားသော (${selectedDate}) ရက်စွဲအတွက် အော်ဒါအသစ် မရှိသေးပါ။</div>`;
                } else {
                    ordersContainer.innerHTML = html;
                }
            });
        }

        // ရက်စွဲပြောင်းလဲသည့်အခါ
        filterDateInput.addEventListener('change', function(e) {
            selectedDate = e.target.value;
            loadOrdersAndStats();
        });

        // ယနေ့သို့ ပြန်သွားရန် ခလုတ်
        document.getElementById('resetDateBtn').addEventListener('click', function() {
            selectedDate = new Date().toISOString().split('T')[0];
            filterDateInput.value = selectedDate;
            loadOrdersAndStats();
        });

        // အော်ဒါပြီးမြတ်၍ ဖျက်ရန်
        window.completeOrder = async function(docId) {
            if (confirm("ဤအော်ဒါကို ပြီးစီးပြီဟု သတ်မှတ်ပြီး ဖျက်မည်မှာ သေချာပါသလား?")) {
                try {
                    await db.collection("orders").doc(docId).delete();
                } catch (error) {
                    console.error("Error removing order: ", error);
                    alert("အော်ဒါဖျက်ရာတွင် အမှားအယွင်း ရှိသွားပါသည်။");
                }
            }
        }

        // စတင်ဖွင့်လှစ်ချိန်တွင် လုပ်ဆောင်ရန်
        loadOrdersAndStats();
    </script>

</body>
</html>
