<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Live Orders</title>
    <!-- Firebase SDKs ထည့်သွင်းခြင်း -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; color: #333; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { background: #2f3542; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; margin-bottom: 5px; }
        p { color: #a4b0be; font-size: 14px; }
        .orders-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .order-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid #ff4757; animation: fadeIn 0.3s ease; }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f2f6; padding-bottom: 10px; margin-bottom: 15px; }
        .order-title { font-size: 18px; font-weight: bold; color: #2f3542; }
        .order-time { font-size: 13px; color: #747d8c; background: #f1f2f6; padding: 4px 8px; border-radius: 6px; }
        .order-items-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .order-items-table th, .order-items-table td { padding: 8px; text-align: left; font-size: 14px; border-bottom: 1px dashed #f1f2f6; }
        .order-items-table th { color: #747d8c; }
        .order-footer { display: flex; justify-content: space-between; align-items: center; }
        .total-price { font-size: 16px; font-weight: bold; color: #ff4757; }
        .complete-btn { background: #2ed573; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .complete-btn:hover { background: #26af5f; }
        .no-orders { text-align: center; background: white; padding: 40px; border-radius: 12px; color: #747d8c; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Restaurant Admin Dashboard</h1>
            <p>Firebase Real-time Orders Management</p>
        </header>

        <!-- အော်ဒါများ ပေါ်မည့် နေရာ -->
        <div class="orders-grid" id="ordersContainer">
            <div class="no-orders">⌛ အော်ဒါအချက်အလက်များကို ချိတ်ဆက်နေပါသည်...</div>
        </div>
    </div>

    <script>
        // Firebase Configuration (သင့်ရဲ့ Project အချက်အလက်များ)
        const firebaseConfig = {
            apiKey: "AIzaSyAV_3fSOQDigao1MDeZ12V734yqqHBKSDw",
            authDomain: "smart-restaurant-85871.firebaseapp.com",
            projectId: "smart-restaurant-85871",
            storageBucket: "smart-restaurant-85871.firebasestorage.app",
            messagingSenderId: "909399970300",
            appId: "1:909399970300:web:8da6c6522af7b1a6296279",
            measurementId: "G-2Z502F3XZP"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ordersContainer = document.getElementById('ordersContainer');

        // 🌟 Firebase Real-time Listener (Data ပြောင်းလဲမှုရှိတိုင်း အလိုအလျောက် Update လုပ်ပေးမည်)
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            if (snapshot.empty) {
                ordersContainer.innerHTML = `<div class="no-orders">📭 လက်တလော အော်ဒါအသစ် မရှိသေးပါ။</div>`;
                return;
            }

            let html = '';
            snapshot.forEach((doc) => {
                let order = doc.data();
                let docId = doc.id; // Firebase Document ID (အော်ဒါဖျက်ရန် သုံးမည်)

                let itemsHtml = '';
                if (order.items) {
                    order.items.forEach(item => {
                        itemsHtml += `
                            <tr>
                                <td>${item.name}</td>
                                <td>x ${item.quantity}</td>
                                <td>${(item.price * item.quantity).toLocaleString()} MMK</td>
                            </tr>
                        `;
                    });
                }

                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <div class="order-title">Table ${order.table}</div>
                            <div class="order-time">🕒 ${order.timeStr || 'Just now'}</div>
                        </div>
                        <table class="order-items-table">
                            <thead>
                                <tr>
                                    <th>Item Name</th>
                                    <th>Qty</th>
                                    <th>Subtotal</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${itemsHtml}
                            </tbody>
                        </table>
                        <div class="order-footer">
                            <div class="total-price">Total: ${order.total ? order.total.toLocaleString() : 0} MMK</div>
                            <button class="complete-btn" onclick="completeOrder('${docId}')">Mark as Complete</button>
                        </div>
                    </div>
                `;
            });

            ordersContainer.innerHTML = html;
        });

        // 🌟 အော်ဒါပြီးပြတ်သွား၍ Database ထဲမှ ဖျောက်ထုတ်ရန် (Complete နှိပ်လျှင်)
        window.completeOrder = async function(docId) {
            if (confirm("ဤအော်ဒါကို ပြီးစီးပြီဟု သတ်မှတ်ပြီး ဖျက်မည်မှာ သေချာပါသလား?")) {
                try {
                    await db.collection("orders").doc(docId).delete();
                } catch (error) {
                    console.error("Error removing order: ", error);
                    alert("အော်ဒါဖျက်ရာတွင် အမှားအယွင်း ရှိသွားပါသည်။");
                }
            }
        }
    </script>

</body>
</html>
